server {
  listen 443 ssl http2;
  server_name apk-rebuilder.example.com;

  # SSL cert/key here

  # Note: frame-ancestors intentionally omitted to avoid requiring host domain list.
  # Add when you are ready to lock down allowed host domains.

  # embed.html and static assets
  location / {
    root /var/www/apk-rebuilder;
    try_files $uri /embed.html;
  }

  # API proxy
  location /api/ {
    proxy_pass http://127.0.0.1:3005/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
