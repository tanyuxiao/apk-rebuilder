<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APK Rebuilder</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #dcdfe6;
      --text: #1f2329;
      --muted: #606266;
      --primary: #2563eb;
      --ok: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(1200px 500px at 80% -20%, #dbeafe, transparent), var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .apk-drawer {
      position: fixed;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 308px;
      z-index: 60;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(6px);
      border: 1px solid var(--line);
      border-left: none;
      border-radius: 0 14px 14px 0;
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.12);
      transform: translateX(0);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .apk-drawer.collapsed {
      transform: translateX(-100%);
      pointer-events: none;
    }

    .apk-drawer.collapsed .apk-drawer-toggle {
      pointer-events: auto;
    }

    .apk-drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 10px 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .apk-drawer-title {
      font-size: 14px;
      font-weight: 700;
    }

    .apk-drawer-toggle {
      position: absolute;
      right: -42px;
      top: 78px;
      width: 42px;
      height: 168px;
      border-radius: 0 12px 12px 0;
      background: #334155;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 16px rgba(2, 6, 23, 0.24);
    }

    .apk-drawer-toggle-label {
      writing-mode: vertical-rl;
      letter-spacing: 2px;
      font-size: 12px;
      font-weight: 700;
    }

    .apk-drawer-toggle-arrow {
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
    }

    .apk-drawer-actions {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
    }

    .apk-list {
      overflow: auto;
      padding: 4px 10px 10px;
      display: grid;
      gap: 8px;
    }

    .apk-item {
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      background: #f8fafc;
      padding: 8px;
    }

    .apk-item-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .apk-item-meta {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .apk-item-row {
      display: flex;
      gap: 6px;
    }

    .apk-item-row button {
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 8px;
    }

    .file-drawer {
      position: fixed;
      right: 0;
      top: 14px;
      bottom: 14px;
      width: 760px;
      z-index: 55;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(6px);
      border: 1px solid var(--line);
      border-right: none;
      border-radius: 14px 0 0 14px;
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.12);
      transform: translateX(0);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .file-drawer.collapsed {
      transform: translateX(100%);
      pointer-events: none;
    }

    .file-drawer.collapsed .file-drawer-toggle {
      pointer-events: auto;
    }

    .file-drawer-toggle {
      position: absolute;
      left: -42px;
      top: 78px;
      width: 42px;
      height: 168px;
      border-radius: 12px 0 0 12px;
      background: #334155;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 16px rgba(2, 6, 23, 0.24);
    }

    .file-drawer-toggle-label {
      writing-mode: vertical-rl;
      letter-spacing: 2px;
      font-size: 12px;
      font-weight: 700;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .target-file-row {
      display: grid;
      grid-template-columns: auto minmax(320px, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .target-file-label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .load-status {
      margin-top: 6px;
      font-size: 12px;
      color: #64748b;
    }

    .load-status.ok {
      color: #166534;
    }

    .load-status.fail {
      color: #b91c1c;
    }

    .dropzone {
      width: 100%;
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      background: #eff6ff;
      color: #1e3a8a;
      min-height: 148px;
      padding: 24px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.16s ease;
      display: grid;
      place-items: center;
    }

    .dropzone.dragover {
      border-color: #2563eb;
      background: #dbeafe;
    }

    .dropzone.loading {
      border-color: #93c5fd;
      background: #e0ecff;
      color: #1e3a8a;
      cursor: not-allowed;
      pointer-events: none;
    }

    .dropzone.loading::before {
      content: '';
      width: 26px;
      height: 26px;
      border: 3px solid #93c5fd;
      border-top-color: #2563eb;
      border-radius: 50%;
      display: block;
      margin: 0 auto 10px;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .unity-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 180px;
      font-family: ui-monospace, Menlo, monospace;
    }

    textarea[readonly] {
      background: #f8fafc;
      border-style: dashed;
      color: #334155;
    }

    button,
    .btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
    }

    button.secondary,
    .btn.secondary {
      background: #475569;
    }

    button.success,
    .btn.success {
      background: var(--ok);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .tag {
      display: inline-block;
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 12px;
      color: #fff;
    }

    .tag.ok {
      background: var(--ok);
    }

    .tag.warn {
      background: var(--warn);
    }

    .tag.fail {
      background: var(--danger);
    }

    .compare-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .readonly-pane {
      background: #f1f5f9;
      border-style: solid;
      border-color: #d7e2ee;
    }

    .editable-pane {
      background: #ffffff;
      border-color: #cfd8e3;
    }

    .compare-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .readonly-hint {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
      color: #475569;
      background: #e2e8f0;
      border-radius: 999px;
      padding: 2px 8px;
    }

    .kv {
      display: grid;
      grid-template-columns: 118px 1fr auto;
      gap: 8px;
      align-items: center;
      margin: 6px 0;
    }

    .kv .k {
      color: var(--muted);
      font-size: 12px;
    }

    .kv .v {
      font-size: 14px;
      word-break: break-all;
    }

    .readonly-pane .kv .v {
      background: transparent;
      border: none;
      border-bottom: 1px dashed #c7d2e0;
      border-radius: 0;
      padding: 2px 0 6px 0;
      min-height: 24px;
    }

    .icon-box {
      width: 76px;
      height: 76px;
      border: 1px solid var(--line);
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #fff;
      margin-bottom: 8px;
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .icon-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .file-pick {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-pick input[type="file"] {
      display: none;
    }

    .file-name {
      color: #64748b;
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .tools-check-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      position: relative;
    }

    .tools-check-summary {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }

    .tools-check-summary.ok {
      color: #166534;
    }

    .tools-check-summary.fail {
      color: #b91c1c;
    }

    .tools-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(420px, 82vw);
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
      padding: 10px;
      z-index: 80;
      display: none;
    }

    .tools-popover.open {
      display: block;
    }

    .tools-popover-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .tools-popover-list {
      display: grid;
      gap: 6px;
      max-height: 260px;
      overflow: auto;
    }

    .tools-popover-item {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      color: #334155;
      background: #f8fafc;
      word-break: break-all;
    }

    .tools-popover-item.ok {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }

    .tools-popover-item.fail {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal-mask.open {
      display: flex;
    }

    .modal {
      width: min(680px, calc(100vw - 24px));
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--line);
      padding: 14px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .editor-canvas-wrap {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
      margin-bottom: 10px;
    }

    #iconEditorCanvas {
      width: 100%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px dashed #cbd5e1;
      background: #fff;
      display: block;
      margin: 0 auto;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .editor-field {
      display: grid;
      gap: 6px;
    }

    .editor-field label {
      font-size: 12px;
      color: #64748b;
    }

    .mod-progress-wrap {
      margin-top: 10px;
    }

    .mod-progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .mod-progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .mod-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      transition: width 280ms ease;
    }

    .mod-progress-bar.success {
      background: linear-gradient(90deg, #4ade80, #22c55e);
    }

    .mod-progress-bar.fail {
      background: linear-gradient(90deg, #fca5a5, #ef4444);
    }

    .file-browser-wrap {
      display: grid;
      grid-template-columns: 1.5fr 1.5fr;
      gap: 12px;
      margin-top: 10px;
    }

    .file-pane {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
      min-height: 420px;
    }

    .tree-pane {
      max-height: 560px;
      overflow: auto;
      padding: 10px;
      min-width: 0;
    }

    .content-pane {
      max-height: 560px;
      overflow: auto;
      padding: 10px;
    }

    .file-tree details {
      margin: 2px 0;
    }

    .file-tree summary {
      cursor: pointer;
      color: #111827;
      font-size: 15px;
      user-select: none;
    }

    .file-tree .children {
      margin-left: 16px;
      border-left: 1px dashed #cbd5e1;
      padding-left: 8px;
    }

    .file-link {
      background: transparent;
      border: none;
      padding: 0;
      margin: 2px 0;
      color: #1d4ed8;
      cursor: pointer;
      font-size: 15px;
      text-align: left;
    }

    .file-link.active {
      color: #0f172a;
      font-weight: 600;
    }

    .file-meta {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 8px;
      flex: 1 1 auto;
      min-width: 0;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .file-meta-row {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .file-meta-row button {
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .file-content {
      width: 100%;
      min-height: 470px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      font-family: ui-monospace, Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .patch-queue {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
    }

    .patch-queue-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .patch-queue-title {
      font-size: 14px;
      font-weight: 600;
    }

    .patch-queue-list {
      display: grid;
      gap: 8px;
    }

    .patch-row {
      border: 1px solid #dbe2ea;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .patch-row.collapsed {
      border-color: #93c5fd;
      box-shadow: inset 0 0 0 1px #bfdbfe;
      background: #f8fbff;
    }

    .patch-row-top {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      min-width: 0;
    }

    .patch-row-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .patch-row-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .patch-open-btn {
      background: transparent;
      color: #0f172a;
      border: none;
      padding: 0;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .patch-open-btn:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #334155;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    .icon-btn:hover:not(:disabled) {
      background: #f1f5f9;
      border-color: #94a3b8;
    }

    .icon-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .task-body {
      border-top: 1px dashed #dbe2ea;
      margin-top: 4px;
      padding-top: 8px;
    }

    .patch-row-meta {
      font-size: 12px;
      color: #64748b;
      word-break: break-all;
    }

    .patch-row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .patch-row-actions button {
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 8px;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .unity-grid {
        grid-template-columns: 1fr;
      }

      .file-browser-wrap {
        grid-template-columns: 1fr;
      }

      .target-file-row {
        grid-template-columns: auto minmax(180px, 1fr) auto;
      }

      .apk-drawer {
        top: auto;
        bottom: 0;
        width: 100%;
        height: 52vh;
        border-radius: 14px 14px 0 0;
        border-left: 1px solid var(--line);
        transform: translateY(calc(100% - 42px));
      }

      .apk-drawer.collapsed {
        transform: translateY(100%);
        pointer-events: none;
      }

      .apk-drawer.collapsed .apk-drawer-toggle {
        pointer-events: auto;
      }

      .apk-drawer:not(.collapsed) {
        transform: translateY(0);
      }

      .apk-drawer-toggle {
        right: 12px;
        top: -36px;
        width: auto;
        min-width: 132px;
        height: 36px;
        border-radius: 10px 10px 0 0;
        flex-direction: row;
        gap: 6px;
        padding: 0 10px;
      }

      .apk-drawer-toggle-label {
        writing-mode: horizontal-tb;
        letter-spacing: 0;
      }

      .file-drawer {
        top: auto;
        bottom: 0;
        width: 100%;
        height: 52vh;
        border-radius: 14px 14px 0 0;
        border-right: 1px solid var(--line);
        transform: translateY(calc(100% - 42px));
        z-index: 54;
      }

      .file-drawer.collapsed {
        transform: translateY(100%);
        pointer-events: none;
      }

      .file-drawer.collapsed .file-drawer-toggle {
        pointer-events: auto;
      }

      .file-drawer:not(.collapsed) {
        transform: translateY(0);
      }

      .file-drawer-toggle {
        left: 12px;
        top: -36px;
        width: auto;
        min-width: 132px;
        height: 36px;
        border-radius: 10px 10px 0 0;
        flex-direction: row;
        gap: 6px;
        padding: 0 10px;
      }

      .file-drawer-toggle-label {
        writing-mode: horizontal-tb;
        letter-spacing: 0;
      }
    }

    @media (min-width: 1400px) {
      .wrap {
        max-width: 1100px;
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
</head>

<body>
  <aside id="apkDrawer" class="apk-drawer">
    <div class="apk-drawer-head">
      <div class="apk-drawer-title">已上传 APK</div>
    </div>
    <div class="apk-drawer-actions">
      <button id="refreshApkLibrary" class="secondary" type="button">刷新</button>
    </div>
    <div id="apkLibraryList" class="apk-list">
      <div class="muted">暂无记录</div>
    </div>
    <button id="apkDrawerToggle" class="apk-drawer-toggle" type="button" aria-label="收起已上传安装包抽屉">
      <span id="apkDrawerToggleArrow" class="apk-drawer-toggle-arrow">«</span>
      <span class="apk-drawer-toggle-label">已上传安装包</span>
    </button>
  </aside>
  <aside id="fileDrawer" class="file-drawer collapsed">
    <div class="apk-drawer-head">
      <div class="apk-drawer-title" style="display:flex; align-items:baseline; gap:8px; min-width:0;">
        <span>文件浏览</span>
        <span id="currentBrowseApk" class="muted" style="font-weight:400;">当前 APK: -</span>
      </div>
    </div>
    <div style="padding: 10px 10px 8px;">
      <input id="fileTreeSearch" type="text" placeholder="搜索文件（支持路径关键字）" />
    </div>
    <div class="file-browser-wrap" style="padding: 0 10px 10px; margin-top: 0;">
      <div class="file-pane tree-pane">
        <div id="fileTreeRoot" class="file-tree muted">请先上传并解析 APK</div>
      </div>
      <div class="file-pane content-pane">
        <div class="file-meta-row">
          <div id="fileMeta" class="file-meta" style="margin-bottom:0;">请选择文件查看内容</div>
          <button id="copyFilePathBtn" class="secondary" type="button">复制路径</button>
        </div>
        <pre id="fileContent" class="file-content">请选择左侧文件</pre>
      </div>
    </div>
    <button id="fileDrawerToggle" class="file-drawer-toggle" type="button" aria-label="展开文件浏览抽屉">
      <span id="fileDrawerToggleArrow" class="apk-drawer-toggle-arrow">«</span>
      <span class="file-drawer-toggle-label">文件浏览</span>
    </button>
  </aside>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div>
          <h1>APK Rebuilder</h1>
          <div class="muted">用于上传 APK、修改包信息与 Unity 参数，并自动重构建签名下载的可视化工具。</div>
        </div>
        <div class="tools-check-wrap">
          <button id="refreshTools" class="secondary">工具检查</button>
          <span id="toolsCheckSummary" class="tools-check-summary">未检查</span>
          <div id="toolsPopover" class="tools-popover" role="dialog" aria-live="polite">
            <div class="tools-popover-title">工具检查结果</div>
            <div id="toolsPopoverList" class="tools-popover-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <strong>上传 APK</strong>
      <div class="row">
        <input id="apkFile" type="file" accept=".apk,application/vnd.android.package-archive" style="display:none" />
        <div id="dropzone" class="dropzone">
          拖拽 APK 到这里，或点击选择文件后自动解析
        </div>
      </div>
      <div class="row">
        <span class="muted">任务ID: <code id="taskId">-</code></span>
        <span class="muted">状态: <span id="taskStatus">idle</span></span>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <strong>包信息修改</strong>
        <div>
          <span class="tag warn" id="changedCount">字段变更 0 项</span>
        </div>
      </div>
      <div class="grid" style="margin-top:10px">
        <div class="compare-box readonly-pane">
          <div class="compare-title">原包信息 <span class="readonly-hint">只读</span></div>
          <div class="icon-box">
            <img id="srcIcon" alt="source icon" style="display:none" />
            <span id="srcIconEmpty" class="icon-empty">无图标</span>
          </div>
          <div class="kv"><span class="k">应用名</span><span class="v" id="srcName">-</span><span></span></div>
          <div class="kv"><span class="k">包名</span><span class="v" id="srcPkg">-</span><span></span></div>
          <div class="kv"><span class="k">版本名</span><span class="v" id="srcVer">-</span><span></span></div>
          <div class="kv"><span class="k">版本号</span><span class="v" id="srcCode">-</span><span></span></div>
        </div>

        <div class="compare-box editable-pane">
          <div class="compare-title">修改信息</div>
          <div class="icon-box">
            <img id="newIcon" alt="new icon" style="display:none" />
            <span id="newIconEmpty" class="icon-empty">无图标</span>
          </div>
          <div class="field"><label>应用名</label><input id="appName" type="text" /></div>
          <div class="field"><label>包名</label><input id="packageName" type="text" /></div>
          <div class="field"><label>版本名</label><input id="versionName" type="text" /></div>
          <div class="field"><label>版本号</label><input id="versionCode" type="text" /></div>
          <div class="field">
            <label>新图标（png/webp/jpg）</label>
            <div class="file-pick">
              <input id="iconFile" type="file" accept=".png,.webp,.jpg,.jpeg,image/png,image/webp,image/jpeg" />
              <button id="pickIconBtn" type="button" class="secondary">选择图标文件</button>
              <span id="iconFileName" class="file-name">未选择任何文件</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <strong>文件信息修改</strong>
      </div>
      <div style="margin-top:12px;">
        <div class="patch-queue">
          <div class="patch-queue-head">
            <div class="patch-queue-title">任务队列（<span id="patchQueueCount">0</span>）</div>
            <div class="row" style="margin-top:0;">
              <button id="createFilePatchTaskBtn" class="secondary" type="button">创建任务</button>
              <button id="clearPatchQueueBtn" class="secondary" type="button">清空任务</button>
            </div>
          </div>
          <div id="patchQueueList" class="patch-queue-list muted">暂无修改任务</div>
          <datalist id="filePathSuggestions"></datalist>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <button id="modBtn">修改并构建</button>
        <a id="downloadBtn" class="btn success" style="display:none" href="#">下载 APK</a>
      </div>
      <div class="mod-progress-wrap">
        <div class="mod-progress-head">
          <span id="modProgressText">等待修改任务开始</span>
          <span id="modProgressPercent">0%</span>
        </div>
        <div class="mod-progress-track">
          <div id="modProgressBar" class="mod-progress-bar"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <strong>日志</strong>
      <textarea id="logs" readonly></textarea>
    </div>
  </div>
  <div id="iconEditorMask" class="modal-mask" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <strong>编辑图标</strong>
        <button id="iconEditorCloseBtn" type="button" class="secondary">取消</button>
      </div>
      <div class="editor-canvas-wrap">
        <canvas id="iconEditorCanvas" width="512" height="512"></canvas>
      </div>
      <div class="editor-grid">
        <div class="editor-field">
          <label>缩放</label>
          <input id="iconScale" type="range" min="0.5" max="2.5" step="0.01" value="1" />
        </div>
        <div class="editor-field">
          <label>左右位移</label>
          <input id="iconOffsetX" type="range" min="-220" max="220" step="1" value="0" />
        </div>
        <div class="editor-field">
          <label>上下位移</label>
          <input id="iconOffsetY" type="range" min="-220" max="220" step="1" value="0" />
        </div>
        <div class="editor-field">
          <label>&nbsp;</label>
          <button id="iconEditorResetBtn" type="button" class="secondary">重置</button>
        </div>
      </div>
      <div class="row" style="justify-content:flex-end; margin-top:12px;">
        <button id="iconEditorApplyBtn" type="button">应用图标</button>
      </div>
    </div>
  </div>

  <script>
    const state = {
      id: '',
      status: 'idle',
      apkInfo: null,
      pollTimer: null,
      activeFlow: '',
      stage: 'idle',
      iconFile: null,
      iconPreviewUrl: '',
      modProgress: 'idle',
      fileTreeLoadedTaskId: '',
      fileTreeData: null,
      fileActivePath: '',
      apkLibraryItems: [],
      apkDrawerCollapsed: false,
      fileDrawerCollapsed: true,
      currentBrowseApkName: '',
      filePatchTasks: [],
      filePathCandidates: [],
      fileTreeSearch: '',
      toolsPopoverOpen: false,
    };
    const iconEditor = {
      fileName: 'icon.png',
      sourceImage: null,
      sourceUrl: '',
      scale: 1,
      offsetX: 0,
      offsetY: 0,
    };

    const $ = (id) => document.getElementById(id);
    const setText = (id, text) => ($(id).textContent = text ?? '-');
    const norm = (v) => (v && String(v).trim() ? String(v).trim() : '-');
    const setIcon = (imgId, emptyId, src) => {
      const img = $(imgId);
      const empty = $(emptyId);
      img.onerror = () => {
        img.removeAttribute('src');
        img.style.display = 'none';
        empty.style.display = 'inline';
      };
      if (src && String(src).trim()) {
        img.src = src;
        img.style.display = 'block';
        empty.style.display = 'none';
      } else {
        img.removeAttribute('src');
        img.style.display = 'none';
        empty.style.display = 'inline';
      }
    };

    function setIconSelection(file, previewUrl, nameText) {
      if (state.iconPreviewUrl && state.iconPreviewUrl !== previewUrl) {
        URL.revokeObjectURL(state.iconPreviewUrl);
      }
      state.iconFile = file;
      state.iconPreviewUrl = previewUrl || '';
      $('iconFileName').textContent = nameText || '未选择任何文件';
      renderCompare();
    }

    function openIconEditor() {
      $('iconEditorMask').classList.add('open');
    }

    function closeIconEditor() {
      $('iconEditorMask').classList.remove('open');
    }

    function renderIconEditorCanvas() {
      const canvas = $('iconEditorCanvas');
      const ctx = canvas.getContext('2d');
      const img = iconEditor.sourceImage;
      if (!ctx || !img) return;
      const cw = canvas.width;
      const ch = canvas.height;
      ctx.clearRect(0, 0, cw, ch);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, cw, ch);

      const fit = Math.min(cw / img.width, ch / img.height);
      const drawW = img.width * fit * iconEditor.scale;
      const drawH = img.height * fit * iconEditor.scale;
      const x = (cw - drawW) / 2 + iconEditor.offsetX;
      const y = (ch - drawH) / 2 + iconEditor.offsetY;
      ctx.drawImage(img, x, y, drawW, drawH);
    }

    async function prepareIconEditor(file) {
      if (iconEditor.sourceUrl) {
        URL.revokeObjectURL(iconEditor.sourceUrl);
      }
      iconEditor.sourceUrl = URL.createObjectURL(file);
      iconEditor.fileName = file.name || 'icon.png';
      iconEditor.scale = 1;
      iconEditor.offsetX = 0;
      iconEditor.offsetY = 0;
      $('iconScale').value = '1';
      $('iconOffsetX').value = '0';
      $('iconOffsetY').value = '0';

      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = iconEditor.sourceUrl;
      });
      iconEditor.sourceImage = img;
      renderIconEditorCanvas();
      openIconEditor();
    }

    async function applyIconEditor() {
      const canvas = $('iconEditorCanvas');
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
      if (!blob) {
        alert('图标处理失败，请重试');
        return;
      }
      const baseName = (iconEditor.fileName || 'icon').replace(/\.[^.]+$/, '');
      const file = new File([blob], `${baseName}.png`, { type: 'image/png' });
      const previewUrl = URL.createObjectURL(blob);
      setIconSelection(file, previewUrl, file.name);
      closeIconEditor();
      $('iconFile').value = '';
    }

    async function api(url, options = {}) {
      const res = await fetch(url, options);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) {
        throw new Error(data?.error?.message || data?.message || `HTTP ${res.status}`);
      }
      return data?.data ?? data;
    }

    function inferStageFromLogs(logs) {
      const last = (logs || []).slice(-8).join('\n');
      if (/Build apk with apktool|Run zipalign|Sign apk|Mod workflow finished/i.test(last)) return 'build';
      if (/Start mod workflow|Manifest update failed|Queue mod workflow/i.test(last)) return 'modify';
      if (/Start apktool decompile|Decompile finished/i.test(last)) return 'parse';
      return state.activeFlow === 'mod' ? 'modify' : 'parse';
    }

    function renderStage() {
      const stage = state.stage;
      const btnMod = $('modBtn');
      const drop = $('dropzone');
      const uploadBusy = stage === 'upload' || stage === 'parse';
      const running = stage === 'parse' || stage === 'modify' || stage === 'build';
      drop.classList.toggle('loading', uploadBusy);
      drop.textContent = uploadBusy ? '上传并解析中，请稍候...' : '拖拽 APK 到这里，或点击选择文件后自动解析';
      drop.style.pointerEvents = uploadBusy ? 'none' : 'auto';
      $('apkFile').disabled = uploadBusy;
      btnMod.disabled = running || !state.id;
      renderModProgress();
    }

    function renderModProgress() {
      const bar = $('modProgressBar');
      const text = $('modProgressText');
      const pct = $('modProgressPercent');

      let p = 0;
      let t = '等待修改任务开始';
      let cls = '';

      switch (state.modProgress) {
        case 'modify':
          p = 45;
          t = '修改中...';
          break;
        case 'build':
          p = 85;
          t = '构建与签名中...';
          break;
        case 'success':
          p = 100;
          t = '修改与构建完成';
          cls = 'success';
          break;
        case 'failed':
          p = 100;
          t = '任务失败，请查看日志';
          cls = 'fail';
          break;
        default:
          p = 0;
          t = '等待修改任务开始';
      }

      bar.classList.remove('success', 'fail');
      if (cls) bar.classList.add(cls);
      bar.style.width = `${p}%`;
      text.textContent = t;
      pct.textContent = `${p}%`;
    }

    function renderTools(data) {
      const tools = data?.tools || {};
      const names = Object.keys(tools);
      const total = names.length;
      const okCount = names.filter((k) => Boolean(tools[k]?.ok)).length;
      const btn = $('refreshTools');
      const summary = $('toolsCheckSummary');
      if (!btn || !summary) return;
      btn.textContent = '工具检查';
      summary.classList.remove('ok', 'fail');
      summary.textContent = total ? `${okCount}/${total} 通过` : '未检查';
      if (total) {
        if (okCount === total) {
          summary.classList.add('ok');
        } else {
          summary.classList.add('fail');
        }
      }
      const detail = names
        .map((k) => `${k}: ${tools[k]?.ok ? 'OK' : 'FAIL'}${tools[k]?.detail ? ` | ${tools[k].detail}` : ''}`)
        .join('\n');
      btn.title = detail;
      summary.title = detail;

      const list = $('toolsPopoverList');
      if (!list) return;
      if (!names.length) {
        list.innerHTML = '<div class="tools-popover-item">暂无检查结果</div>';
        return;
      }
      list.innerHTML = names
        .map((k) => {
          const t = tools[k] || {};
          const cls = t.ok ? 'ok' : 'fail';
          const detailText = t.detail ? ` | ${t.detail}` : '';
          return `<div class="tools-popover-item ${cls}"><strong>${k}</strong>: ${t.ok ? 'OK' : 'FAIL'}${detailText}</div>`;
        })
        .join('');
    }

    function setToolsPopoverOpen(open) {
      state.toolsPopoverOpen = Boolean(open);
      const pop = $('toolsPopover');
      if (!pop) return;
      pop.classList.toggle('open', state.toolsPopoverOpen);
    }

    function renderCompare() {
      const info = state.apkInfo || {};
      const next = {
        appName: $('appName').value.trim() || info.appName || '',
        packageName: $('packageName').value.trim() || info.packageName || '',
        versionName: $('versionName').value.trim() || info.versionName || '',
        versionCode: $('versionCode').value.trim() || info.versionCode || ''
      };

      setText('srcName', norm(info.appName));
      setText('srcPkg', norm(info.packageName));
      setText('srcVer', norm(info.versionName));
      setText('srcCode', norm(info.versionCode));

      const changes = [
        norm(info.appName) !== norm(next.appName),
        norm(info.packageName) !== norm(next.packageName),
        norm(info.versionName) !== norm(next.versionName),
        norm(info.versionCode) !== norm(next.versionCode)
      ].filter(Boolean).length;
      setText('changedCount', `字段变更 ${changes} 项`);

      const srcIcon = info.iconUrl || '';
      const newIcon = state.iconPreviewUrl || srcIcon;
      setIcon('srcIcon', 'srcIconEmpty', srcIcon);
      setIcon('newIcon', 'newIconEmpty', newIcon);
    }

    function formatBytes(size) {
      if (!Number.isFinite(size)) return '-';
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      return `${(size / 1024 / 1024).toFixed(1)} MB`;
    }

    function fmtTime(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleString();
    }

    function applyDrawerState() {
      const el = $('apkDrawer');
      if (!el) return;
      el.classList.toggle('collapsed', state.apkDrawerCollapsed);
      $('apkDrawerToggleArrow').textContent = state.apkDrawerCollapsed ? '»' : '«';
      $('apkDrawerToggle').setAttribute(
        'aria-label',
        state.apkDrawerCollapsed ? '展开已上传安装包抽屉' : '收起已上传安装包抽屉'
      );
    }

    function applyFileDrawerState() {
      const el = $('fileDrawer');
      if (!el) return;
      el.classList.toggle('collapsed', state.fileDrawerCollapsed);
      $('fileDrawerToggleArrow').textContent = state.fileDrawerCollapsed ? '«' : '»';
      $('fileDrawerToggle').setAttribute(
        'aria-label',
        state.fileDrawerCollapsed ? '展开文件浏览抽屉' : '收起文件浏览抽屉'
      );
    }

    function renderCurrentBrowseApk() {
      $('currentBrowseApk').textContent = `当前 APK: ${state.currentBrowseApkName || '-'}`;
    }

    function createPatchId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function createFilePatchTask() {
      return {
        id: createPatchId(),
        enabled: true,
        collapsed: false,
        path: '',
        method: 'edit',
        loadStatusText: '未读取文件',
        loadStatusKind: '',
        originalContent: '',
        modifiedContent: '',
        matchText: '',
        replaceText: '',
        matchRegex: false,
        replaceFile: null,
        replaceFileName: '未选择任何文件',
      };
    }

    function getSupportedModeLabel(editable, replaceable) {
      if (editable && replaceable) {
        return '可编辑 / 可替换';
      }
      if (editable) {
        return '可编辑';
      }
      if (replaceable) {
        return '仅可替换';
      }
      return '不可修改';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderPatchQueue() {
      const list = $('patchQueueList');
      const tasks = state.filePatchTasks || [];
      const enabledCount = tasks.filter((x) => x.enabled).length;
      $('patchQueueCount').textContent = `${enabledCount}/${tasks.length}`;

      if (!tasks.length) {
        list.classList.add('muted');
        list.innerHTML = '暂无修改任务';
        return;
      }

      list.classList.remove('muted');
      list.innerHTML = tasks
        .map((task, idx) => {
          const pathText = task.path?.trim() || '未设置路径';
          const modeText = task.method === 'replace' ? '替换' : '编辑';
          const summary = `${pathText} | ${modeText}`;
          const statusClass = task.loadStatusKind === 'ok' ? 'ok' : (task.loadStatusKind === 'fail' ? 'fail' : '');
          const methodEditBg = task.method === 'edit' ? 'var(--primary)' : '#475569';
          const methodReplaceBg = task.method === 'replace' ? 'var(--primary)' : '#475569';
          return `
            <div class="patch-row ${task.collapsed ? 'collapsed' : ''}" data-task-id="${task.id}">
              <div class="patch-row-top">
                <div class="patch-row-left">
                  <input type="checkbox" data-action="toggle-enable" ${task.enabled ? 'checked' : ''} />
                  <button class="patch-open-btn" type="button" data-action="toggle-collapse" title="展开或收纳任务">#${idx + 1} ${escapeHtml(summary)}</button>
                </div>
                <div class="patch-row-right">
                  <button class="icon-btn" type="button" data-action="toggle-collapse" title="${task.collapsed ? '展开' : '收纳'}">${task.collapsed ? '▸' : '▾'}</button>
                  <button class="icon-btn" type="button" data-action="move-up" title="上移" ${idx === 0 ? 'disabled' : ''}>↑</button>
                  <button class="icon-btn" type="button" data-action="move-down" title="下移" ${idx === tasks.length - 1 ? 'disabled' : ''}>↓</button>
                  <button class="icon-btn" type="button" data-action="remove" title="删除">✕</button>
                </div>
              </div>
              <div class="task-body" style="display:${task.collapsed ? 'none' : 'block'};">
                <div class="target-file-row">
                  <span class="target-file-label">目标文件路径</span>
                  <input type="text" data-field="path" list="filePathSuggestions" value="${escapeHtml(task.path || '')}" placeholder="例如 assets/StreamingAssets/scene-config.json" />
                  <button class="secondary" type="button" data-action="load-file">读取文件</button>
                </div>
                <div class="load-status ${statusClass}">${escapeHtml(task.loadStatusText || '未读取文件')}</div>

                <div class="row" style="margin-top:8px;">
                  <button class="secondary" type="button" data-action="set-method" data-method="edit" style="background:${methodEditBg}">编辑</button>
                  <button class="secondary" type="button" data-action="set-method" data-method="replace" style="background:${methodReplaceBg}">替换</button>
                </div>

                <div style="display:${task.method === 'edit' ? 'block' : 'none'};">
                  <div class="unity-grid">
                    <div>
                      <div class="muted" style="margin-bottom:6px;">原文件内容（只读）</div>
                      <textarea readonly data-field="originalContent">${escapeHtml(task.originalContent || '')}</textarea>
                    </div>
                    <div>
                      <div class="muted" style="margin-bottom:6px;">修改后内容（可编辑）</div>
                      <textarea data-field="modifiedContent" placeholder="读取文件后可直接编辑替换">${escapeHtml(task.modifiedContent || '')}</textarea>
                    </div>
                  </div>
                  <div class="grid" style="margin-top:8px;">
                    <div class="field"><label>匹配文本</label><input type="text" data-field="matchText" value="${escapeHtml(task.matchText || '')}" /></div>
                    <div class="field"><label>替换文本</label><input type="text" data-field="replaceText" value="${escapeHtml(task.replaceText || '')}" /></div>
                  </div>
                  <div class="row" style="margin-top:4px;">
                    <label class="muted" style="display:flex; align-items:center; gap:6px;">
                      <input type="checkbox" data-field="matchRegex" ${task.matchRegex ? 'checked' : ''} /> 正则表达式
                    </label>
                  </div>
                </div>

                <div style="display:${task.method === 'replace' ? 'block' : 'none'}; margin-top:8px;">
                  <div class="field">
                    <label>选择替换文件</label>
                    <div class="file-pick">
                      <input type="file" data-action="replace-file-input" />
                      <button class="secondary" type="button" data-action="pick-replace-file">选择文件</button>

                    </div>

                </div>

    function renderApkLibrary() {
      const root = $('apkLibraryList');
      const items = state.apkLibraryItems || [];
      if (!items.length) {
        root.innerHTML = '<div class="muted">暂无记录</div>';
        return;
      }
      root.innerHTML = items
        .map((item) => {
          const name = item.name || item.storedName || item.id;
          return `
              <div class="apk-item">
                <div class="apk-item-name">${name}</div>
                <div class="apk-item-meta">大小: ${formatBytes(Number(item.size || 0))}</div>
                <div class="apk-item-meta">上传时间: ${fmtTime(item.createdAt)}</div>
                <div class="apk-item-meta">最近使用: ${fmtTime(item.lastUsedAt || item.createdAt)}</div>
                <div class="apk-item-row">
                  <button type="button" class="secondary" data-use-apk-id="${item.id}">使用</button>
                  <button type="button" class="secondary" data-del-apk-id="${item.id}">删除</button>

      root.querySelectorAll('[data-use-apk-id]').forEach((el) => {

      root.querySelectorAll('[data-del-apk-id]').forEach((el) => {
        el.addEventListener('click', async () => {
          const id = el.getAttribute('data-del-apk-id');

          await refreshApkLibrary();

    async function refreshApkLibrary() {
      const data = await api('/api/library/apks');
      state.apkLibraryItems = data.items || [];
      renderApkLibrary();
    }

    function resetForNewTask(taskId, sourceName = '') {
      state.id = taskId;
      state.currentBrowseApkName = sourceName || '';
      state.activeFlow = 'upload';
      state.stage = 'parse';
      state.fileTreeLoadedTaskId = '';
      state.fileTreeData = null;
      state.fileActivePath = '';
      state.filePatchTasks = [];
      state.filePathCandidates = [];
      state.fileTreeSearch = '';
      $('fileTreeSearch').value = '';
      $('fileMeta').textContent = '请选择文件查看内容';
      $('fileContent').textContent = '请选择左侧文件';
      renderFilePathSuggestions();
      renderFileTree();
      setIconSelection(null, '', '未选择任何文件');
      state.modProgress = 'idle';
      setText('taskId', state.id);
      renderCurrentBrowseApk();
      renderPatchQueue();

    async function useLibraryApk(apkId) {
      const data = await api('/api/library/use', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: apkId })
      });
      resetForNewTask(data.id, data?.libraryItem?.name || '');
      await refreshStatus();
      clearInterval(state.pollTimer);
      state.pollTimer = setInterval(refreshStatus, 1200);
      await refreshApkLibrary();
    }

    function renderFileTree() {
      const root = $('fileTreeRoot');
      const data = state.fileTreeData;
      if (!data?.tree) {
        root.innerHTML = '<span class="muted">请先上传并解析 APK</span>';
        return;
      }

      const keyword = String(state.fileTreeSearch || '').trim().toLowerCase();
      const filterNode = (node) => {
        if (!keyword) return node;
        if (node.type === 'file') {
          const name = String(node.name || '').toLowerCase();
          const path = String(node.path || '').toLowerCase();
          return name.includes(keyword) || path.includes(keyword) ? node : null;
        }
        const children = Array.isArray(node.children) ? node.children : [];
        const filteredChildren = children.map(filterNode).filter(Boolean);
        const name = String(node.name || '').toLowerCase();
        const path = String(node.path || '').toLowerCase();
        if (filteredChildren.length || name.includes(keyword) || path.includes(keyword)) {
          return { ...node, children: filteredChildren };
        }
        return null;
      };

      const filteredRoot = filterNode(data.tree);
      if (!filteredRoot) {
        root.innerHTML = `<span class="muted">未找到匹配文件：${state.fileTreeSearch}</span>`;
        return;
      }

      const renderNode = (node) => {
        if (node.type === 'dir') {
          const children = (node.children || []).map(renderNode).join('');
          return `
              <details open>
                <summary>📁 ${node.name}</summary>
                <div class="children">${children || '<span class="muted">空目录</span>'}</div>
              </details>
            `;
        }
        const isActive = state.fileActivePath === node.path ? 'active' : '';
        return `
            <div>
              <button class="file-link ${isActive}" data-file-path="${node.path}" type="button">📄 ${node.name}</button>
            </div>
          `;
      };

      root.innerHTML = renderNode(filteredRoot);
      root.querySelectorAll('[data-file-path]').forEach((el) => {
        el.addEventListener('click', () => {
          const p = el.getAttribute('data-file-path');
          if (p) {
            loadFileContent(p).catch((e) => alert(e.message));
          }
        });
      });
    }

    function collectFilePaths(node, out) {
      if (!node || typeof node !== 'object') return;
      if (node.type === 'file' && node.path) {
        out.push(String(node.path));
        return;
      }
      const children = Array.isArray(node.children) ? node.children : [];
      children.forEach((child) => collectFilePaths(child, out));
    }

    function renderFilePathSuggestions() {
      const datalist = $('filePathSuggestions');
      if (!datalist) return;
      datalist.innerHTML = '';
      const paths = (state.filePathCandidates || []).slice(0, 4000);
      paths.forEach((path) => {
        const option = document.createElement('option');
        option.value = path;
        datalist.appendChild(option);
      });
    }

    async function refreshFileTree() {
      if (!state.id) {
        $('fileTreeRoot').innerHTML = '<span class="muted">请先上传并解析 APK</span>';
        state.filePathCandidates = [];
        renderFilePathSuggestions();
        return;
      }
      const data = await api(`/api/files/${state.id}/tree`);
      state.fileTreeData = data;
      state.fileTreeLoadedTaskId = state.id;
      const paths = [];
      collectFilePaths(data?.tree, paths);
      state.filePathCandidates = [...new Set(paths)].sort((a, b) => a.localeCompare(b));
      renderFilePathSuggestions();
      renderFileTree();
    }

    async function loadFileContent(filePath) {
      if (!state.id) return;
      const data = await api(`/api/files/${state.id}/content?path=${encodeURIComponent(filePath)}`);
      state.fileActivePath = filePath;
      renderFileTree();

      const truncatedHint = data.truncated ? '（已截断）' : '';
      $('fileMeta').textContent = `${data.path} | ${data.mime} | ${formatBytes(data.size)} ${truncatedHint}`.trim();

      if (data.kind === 'binary') {
        $('fileContent').textContent =
          `[二进制文件]\nBase64 预览（最多 ${formatBytes(512 * 1024)}）:\n\n${data.content}`;
        return;
      }
      $('fileContent').textContent = data.content || '';
    }

    async function copyCurrentFilePath() {
      const path = state.fileActivePath || '';
      if (!path) {
        alert('请先在左侧选择一个文件');
        return;
      }

      try {
        await navigator.clipboard.writeText(path);
        $('copyFilePathBtn').textContent = '已复制';
        setTimeout(() => {
          $('copyFilePathBtn').textContent = '复制路径';
        }, 1200);
      } catch {
        const textarea = document.createElement('textarea');
        textarea.value = path;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        $('copyFilePathBtn').textContent = '已复制';
        setTimeout(() => {
          $('copyFilePathBtn').textContent = '复制路径';
        }, 1200);
      }
    }

    function applyStatus(data) {
      state.status = data.status || 'idle';
      setText('taskStatus', state.status);
      if (data?.sourceName) {
        state.currentBrowseApkName = data.sourceName;
        renderCurrentBrowseApk();
      }
      state.apkInfo = data.apkInfo || null;
      $('logs').value = (data.logs || []).join('\n');

      if (state.apkInfo) {
        $('appName').value ||= state.apkInfo.appName || '';
        $('packageName').value ||= state.apkInfo.packageName || '';
        $('versionName').value ||= state.apkInfo.versionName || '';
        $('versionCode').value ||= state.apkInfo.versionCode || '';
        renderCompare();
      }

      if (state.id && state.status === 'success' && state.fileTreeLoadedTaskId !== state.id) {
        void refreshFileTree().catch(() => {
          // ignore tree refresh errors during polling
        });
      }

      const ready = Boolean(data.downloadReady && state.id);
      const dl = $('downloadBtn');
      if (ready) {
        dl.href = `/api/download/${state.id}`;
        dl.style.display = 'inline-block';
      } else {
        dl.style.display = 'none';
      }

      if (state.status === 'success' || state.status === 'failed') {
        clearInterval(state.pollTimer);
        state.pollTimer = null;
        if (state.activeFlow === 'mod') {
          state.modProgress = state.status === 'success' ? 'success' : 'failed';
        }
        state.activeFlow = '';
        state.stage = 'idle';
      } else if (state.status === 'processing') {
        state.stage = inferStageFromLogs(data.logs || []);
        if (state.activeFlow === 'mod' && state.stage === 'build') {
          state.modProgress = 'build';
        }
      }
      renderStage();
    }

    async function uploadFile(file) {
      if (!file) return;
      const fileName = String(file.name || '').toLowerCase();
      if (!fileName.endsWith('.apk')) {
        alert('仅支持 APK 文件');
        return;
      }

      state.activeFlow = 'upload';
      state.stage = 'upload';
      renderStage();

      const form = new FormData();
      form.append('apk', file);
      const data = await api('/api/upload', { method: 'POST', body: form });

      resetForNewTask(data.id, data?.libraryItem?.name || file.name || '');
      await refreshStatus();
      clearInterval(state.pollTimer);
      state.pollTimer = setInterval(refreshStatus, 1200);
      await refreshApkLibrary();
    }

    async function fileToBase64(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const comma = result.indexOf(',');
          resolve(comma >= 0 ? result.slice(comma + 1) : result);
        };
        reader.onerror = () => reject(new Error('读取替换文件失败'));
        reader.readAsDataURL(file);
      });
    }

    function getFilePatchTask(taskId) {
      return state.filePatchTasks.find((x) => x.id === taskId);
    }

    async function loadTaskFile(taskId, silent = false) {
      const task = getFilePatchTask(taskId);
      if (!task) return;
      if (!state.id) {
        if (!silent) alert('请先上传并解析 APK');
        return;
      }
      const editPath = String(task.path || '').trim();
      if (!editPath) {
        task.loadStatusText = '读取失败：请先填写目标文件路径';
        task.loadStatusKind = 'fail';
        renderPatchQueue();
        if (!silent) alert('请先填写目标文件路径');
        return;
      }
      try {
        const data = await api(`/api/edit-file/${state.id}?path=${encodeURIComponent(editPath)}`);
        const normalizedPath = data.path || editPath;
        task.path = normalizedPath;
        task.originalContent = data.content || '';
        task.modifiedContent = data.content || '';
        if (!data.editable) {
          task.method = 'replace';
        }
        task.loadStatusText = `读取成功：${normalizedPath} | ${formatBytes(Number(data.size || 0))} | ${getSupportedModeLabel(Boolean(data.editable), Boolean(data.replaceable ?? true))}`;
        task.loadStatusKind = 'ok';
        renderPatchQueue();
      } catch (e) {
        task.loadStatusText = `读取失败：${e?.message || '未知错误'}`;
        task.loadStatusKind = 'fail';
        renderPatchQueue();
        if (!silent) throw e;
      }
    }

    function collectTaskDraftPatches(task) {
      const path = String(task.path || '').trim();
      if (!path) return [];

      if (task.method === 'replace') {
        if (!task.replaceFile) return [];
        return [
          {
            path,
            mode: 'file_replace',
            replacementFile: task.replaceFile,
            replacementFileName: task.replaceFileName || task.replaceFile.name || 'replacement.bin',
          }
        ];
      }

      const drafts = [];
      const matchText = String(task.matchText || '');
      const replaceText = String(task.replaceText || '');
      if (matchText) {
        drafts.push({ path, mode: 'text_replace', matchText, replaceText, regex: Boolean(task.matchRegex) });
      }

      const original = String(task.originalContent || '');
      const modified = String(task.modifiedContent || '');
      if ((original || modified) && original !== modified) {
        drafts.push({ path, mode: 'direct_edit', content: modified });
      }
      return drafts;
    }

    async function buildQueuedFilePatchesInput() {
      const result = [];
      for (const task of state.filePatchTasks) {
        if (!task.enabled) continue;
        const drafts = collectTaskDraftPatches(task);
        if (!drafts.length) {
          continue;
        }
        for (const patch of drafts) {
          if (patch.mode === 'file_replace') {
            const file = patch.replacementFile;
            if (!file) {
              throw new Error(`替换任务缺少文件: ${patch.path}`);
            }
            result.push({
              path: patch.path,
              mode: 'file_replace',
              replacementBase64: await fileToBase64(file),
            });
            continue;
          }
          if (patch.mode === 'text_replace') {
            result.push({
              path: patch.path,
              mode: 'text_replace',
              matchText: patch.matchText || '',
              replaceText: patch.replaceText || '',
              regex: Boolean(patch.regex),
            });
            continue;
          }
          if (patch.mode === 'direct_edit') {
            result.push({
              path: patch.path,
              mode: 'direct_edit',
              content: patch.content || '',
            });
          }
        }
      }
      return result;
    }

    async function modBuild() {
      if (!state.id) return alert('请先上传并解析 APK');
      state.activeFlow = 'mod';
      state.stage = 'modify';
      state.modProgress = 'modify';
      renderStage();
      const form = new FormData();
      form.append('id', state.id);

      const appName = $('appName').value.trim();
      const packageName = $('packageName').value.trim();
      const versionName = $('versionName').value.trim();
      const versionCode = $('versionCode').value.trim();
      if (appName) form.append('appName', appName);
      if (packageName) form.append('packageName', packageName);
      if (versionName) form.append('versionName', versionName);
      if (versionCode) form.append('versionCode', versionCode);

      const icon = state.iconFile;
      if (icon) form.append('icon', icon);

      const filePatches = await buildQueuedFilePatchesInput();
      if (filePatches.length) form.append('filePatches', JSON.stringify(filePatches));

      await api('/api/mod', {
        method: 'POST',
        body: form
      });

      state.stage = 'build';
      state.modProgress = 'build';
      renderStage();
      await refreshStatus();
      clearInterval(state.pollTimer);
      state.pollTimer = setInterval(refreshStatus, 1200);
    }

    $('createFilePatchTaskBtn').addEventListener('click', () => {

        return;

    $('clearPatchQueueBtn').addEventListener('click', () => {
      if (!state.filePatchTasks.length) return;
      if (!confirm('确认清空所有修改任务吗？')) return;
      state.filePatchTasks = [];
      renderPatchQueue();
    });
    $('patchQueueList').addEventListener('click', (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      const row = target.closest('[data-task-id]');
      if (!row) return;
      const taskId = row.getAttribute('data-task-id') || '';
      const task = getFilePatchTask(taskId);
      if (!task) return;
      const action = target.getAttribute('data-action') || '';

      if (action === 'toggle-collapse') {
        task.collapsed = !task.collapsed;
        renderPatchQueue();
        return;
      }
      if (action === 'move-up') {
        const idx = state.filePatchTasks.findIndex((x) => x.id === taskId);
        if (idx > 0) {
          const tmp = state.filePatchTasks[idx - 1];
          state.filePatchTasks[idx - 1] = state.filePatchTasks[idx];
          state.filePatchTasks[idx] = tmp;
          renderPatchQueue();
        }
        return;
      }
      if (action === 'move-down') {
        const idx = state.filePatchTasks.findIndex((x) => x.id === taskId);
        if (idx >= 0 && idx < state.filePatchTasks.length - 1) {
          const tmp = state.filePatchTasks[idx + 1];
          state.filePatchTasks[idx + 1] = state.filePatchTasks[idx];
          state.filePatchTasks[idx] = tmp;
          renderPatchQueue();
        }
        return;
      }
      if (action === 'remove') {
        state.filePatchTasks = state.filePatchTasks.filter((x) => x.id !== taskId);
        renderPatchQueue();
        return;
      }
      if (action === 'set-method') {
        const method = target.getAttribute('data-method');
        if (method === 'edit' || method === 'replace') {
          task.method = method;
          renderPatchQueue();
        }
        return;
      }
      if (action === 'pick-replace-file') {
        const input = row.querySelector('input[data-action="replace-file-input"]');
        if (input instanceof HTMLInputElement) {
          input.click();
        }
        return;
      }
      if (action === 'load-file') {
        loadTaskFile(taskId).catch((err) => alert(err.message || '读取文件失败'));
      }
    });
    $('patchQueueList').addEventListener('change', (e) => {
      const target = e.target;
      if (!(target instanceof HTMLInputElement)) return;
      const row = target.closest('[data-task-id]');
      if (!row) return;
      const taskId = row.getAttribute('data-task-id') || '';
      const task = getFilePatchTask(taskId);
      if (!task) return;

      const action = target.getAttribute('data-action') || '';
      const field = target.getAttribute('data-field') || '';

      if (action === 'toggle-enable') {
        task.enabled = Boolean(target.checked);
        renderPatchQueue();
        return;
      }
      if (action === 'replace-file-input') {
        const file = target.files?.[0] || null;
        task.replaceFile = file;
        task.replaceFileName = file ? (file.name || '已选文件') : '未选择任何文件';
        renderPatchQueue();
        return;
      }
      if (field === 'matchRegex') {
        task.matchRegex = Boolean(target.checked);
        return;
      }
      if (field) {
        task[field] = target.value;
      }
    });
    $('patchQueueList').addEventListener('input', (e) => {

      }
    });
    ['dragenter', 'dragover'].forEach((evt) => {
      $('dropzone').addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        $('dropzone').classList.add('dragover');
      });
    });
    ['dragleave', 'dragend'].forEach((evt) => {
      $('dropzone').addEventListener(evt, (e) => {
        e.preventDefault();
        e.stopPropagation();
        $('dropzone').classList.remove('dragover');
      });
    });
    $('dropzone').addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      $('dropzone').classList.remove('dragover');
      const file = e.dataTransfer?.files?.[0];
      if (file) {
        uploadFile(file).catch((err) => alert(err.message));
      }
    });
    $('modBtn').addEventListener('click', () => modBuild().catch((e) => alert(e.message)));

    refreshTools();
    applyDrawerState();
    applyFileDrawerState();
    renderFilePathSuggestions();
    renderPatchQueue();
    renderCurrentBrowseApk();
    refreshApkLibrary();
    renderFileTree();
    renderStage();
  </script>
</body>

</html>
