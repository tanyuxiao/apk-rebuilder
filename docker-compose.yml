services:
  apk-modder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_BUILD_IMAGE: ${PYTHON_BUILD_IMAGE:-python:3.12-bookworm}
        PYTHON_RUNTIME_IMAGE: ${PYTHON_RUNTIME_IMAGE:-python:3.12-slim-bookworm}
        APKTOOL_VERSION: ${APKTOOL_VERSION:-2.11.1}
        APKTOOL_JAR_URL: ${APKTOOL_JAR_URL:-https://github.com/iBotPeaches/Apktool/releases/download/v2.11.1/apktool_2.11.1.jar}
        ANDROID_BUILD_TOOLS_VERSION: ${ANDROID_BUILD_TOOLS_VERSION:-34.0.0}
        ANDROID_BUILD_TOOLS_URL: ${ANDROID_BUILD_TOOLS_URL:-https://dl.google.com/android/repository/build-tools_r34-linux.zip}
        JDK_URL_AMD64: ${JDK_URL_AMD64:-https://api.adoptium.net/v3/binary/latest/17/ga/linux/x64/jdk/hotspot/normal/eclipse}
        JDK_URL_ARM64: ${JDK_URL_ARM64:-https://api.adoptium.net/v3/binary/latest/17/ga/linux/aarch64/jdk/hotspot/normal/eclipse}
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - apk_modder_data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - PYTHONDONTWRITEBYTECODE=1
      - APKTOOL_PATH=/usr/local/bin/apktool
      - ZIPALIGN_PATH=/usr/local/bin/zipalign
      - APKSIGNER_PATH=/usr/local/bin/apksigner
      - KEYTOOL_PATH=keytool
      - DEBUG_KEY_ALIAS=androiddebugkey
      - DEBUG_KEY_PASS=android
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3000", "--reload", "--reload-dir", "/app"]
    restart: unless-stopped

volumes:
  apk_modder_data:
