services:
  apk-rebuilder:
    image: ${APK_REBUILDER_IMAGE:-ghcr.io/tanyuxiao/apk-rebuilder:latest}
    pull_policy: always
    ports:
      - '3005:3005'
    environment:
      - PORT=3005
      - HOST=0.0.0.0
      - PLUGIN_MODE=true
      - APK_REBUILDER_UI_MODE=embed
      - REDIS_HOST=redis-apk-rebuilder
      - REDIS_PORT=6379
    depends_on:
      redis-apk-rebuilder:
        condition: service_healthy

  redis-apk-rebuilder:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:16379:6379'
    volumes:
      - apk_rebuilder_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  apk_rebuilder_redis_data:
